const f1 = (x) => Math.round(x * 10) / 10;

function GheChiaGio({ item, roles, sach }) {
  const [n, setN] = useState(1);
  const [soChuBien, setSoChuBien] = useState(1);
  const T = item.total;
  const nn = Math.max(1, n);

  const chinh = (1 / 3) * T + ((2 / 3) * T) / nn;
  const chubien = sach
    ? (1 / (3 * Math.max(1, soChuBien))) * T + ((2 / 3) * T) / nn
    : null;
  const tg1 = (1 / 6) * T + ((2 / 3) * T) / nn;
  const dong = ((2 / 3) * T) / nn;

  return (
    <div className="rowcalc">
      <div className="rowtop">
        <span className="ilabel">{item.label}</span>
        <span className="itotal">{T} giờ</span>
      </div>
      <div className="inputs">
        <label>
          Tổng số thành viên (n)
          <input type="number" min="1" value={n}
            onChange={(e) => setN(parseInt(e.target.value) || 1)} />
        </label>
        {sach && (
          <label>
            Số đồng chủ biên
            <input type="number" min="1" value={soChuBien}
              onChange={(e) => setSoChuBien(parseInt(e.target.value) || 1)} />
          </label>
        )}
      </div>
      <div className="results">
        {roles.includes("CHINH") && (
          <Res name={sach ? "Chủ biên (1 người)" : VAITRO.CHINH} v={chinh} />
        )}
        {sach && soChuBien > 1 && (
          <Res name="Mỗi đồng chủ biên" v={chubien} />
        )}
        {roles.includes("TG1") && <Res name={VAITRO.TG1} v={tg1} />}
        {roles.includes("DONG") && (
          <Res name={sach ? "Đồng tác giả" : VAITRO.DONG} v={dong} />
        )}
      </div>
    </div>
  );
}

function Res({ name, v }) {
  return (
    <div className="res">
      <span>{name}</span>
      <span className="resv">
        {f1(v)} <em>giờ LV</em> · <b>{f1(v / HE_SO)}</b> <em>giờ chuẩn</em>
      </span>
    </div>
  );
}

function GheTuyenChon({ item }) {
  const [n, setN] = useState(2);
  const nn = Math.max(2, n);
  const tv = item.tv / (nn - 1);
  return (
    <div className="rowcalc">
      <div className="rowtop">
        <span className="ilabel">{item.label}</span>
        <span className="itotal">{item.total} giờ</span>
      </div>
      <div className="inputs">
        <label>
          Tổng số thành viên (n)
          <input type="number" min="2" value={n}
            onChange={(e) => setN(parseInt(e.target.value) || 2)} />
        </label>
      </div>
      <div className="results">
        <Res name="Chủ nhiệm" v={item.cn} />
        <Res name={`Mỗi thành viên khác (chia ${nn - 1})`} v={tv} />
      </div>
    </div>
  );
}

function GheCanhan({ item }) {
  return (
    <div className="rowcalc">
      <div className="rowtop">
        <span className="ilabel">{item.label}</span>
      </div>
      <div className="results">
        <Res name="Người thực hiện" v={item.canhan} />
      </div>
    </div>

}

function GheKhac({ item }) {
  const [n, setN] = useState(1);
  if (item.canhan != null) return <GheCanhan item={item} />;
  const nn = Math.max(1, n);
  const v = item.total / nn;
  return (
    <div className="rowcalc">
      <div className="rowtop">
        <span className="ilabel">{item.label}</span>
        <span className="itotal">{item.total} giờ / lượt</span>
      </div>
      <div className="inputs">

          Số người chia đều (n)

            onChange={(e) => setN(parseInt(e.target.value) || 1)} />

      <div className="results">

        {item.cap && <div className="cap">Trần: tối đa {item.cap} giờ LV / người / năm</div>}
      </div>
    </div>
  );
}

            {tile === 0 && <span className="mgzero"> (được miễn)</span>}
          </div>
        </div>
      </section>

      <div className="note-global">
        Mỗi kết quả hiển thị theo <b>giờ làm việc</b> và <b>giờ chuẩn</b> (đã chia hệ số {f1(HE_SO)}).
        So sánh tổng giờ chuẩn đạt được với định mức ở trên để biết mức hoàn thành nhiệm vụ.
      </div>

      {DATA.map((g, gi) => (
        <section className="panel" key={gi}>
          <button className="ghead" onClick={() => setOpen(open === gi ? -1 : gi)}>
            <span>{g.group}</span>
            <span className="chev">{open === gi ? "–" : "+"}</span>
          </button>
          {open === gi && (
            <div className="gbody">
              {g.note && <div className="gnote">{g.note}</div>}
              {g.items.map((item, ii) => {
                if (g.canhanOnly) return <GheCanhan key={ii} item={item} />;
                if (g.tuyenchon) return <GheTuyenChon key={ii} item={item} />;
                if (g.group.startsWith("12.")) return <GheKhac key={ii} item={item} />;
                return (
                  <GheChiaGio key={ii} item={item} roles={g.roles} sach={g.sach} />
                );
              })}
            </div>
          )}
        </section>
      ))}

      <footer className="ft">
        Công cụ hỗ trợ tính toán nội bộ theo QĐ 1142. Kết quả mang tính tham khảo;
        trường hợp đặc biệt (trễ hạn, không hoàn thành, thưởng nghiệm thu Tốt+) cần
        đối chiếu bản quy định gốc và quyết định của Hội đồng đánh giá.
      </footer>
    </div>
  );
}
